<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Produkt – Therwatt</title>
  <meta name="description" content="Produktside med pris, beskrivelse og mulighet for kjøp eller tilbudsforespørsel.">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="container nav">
      <a class="brand" href="index.html"><span class="brand-mark"></span> Therwatt</a>
      <nav class="menu">
        <a href="index.html" data-page="index.html">Forside</a>
        <a href="butikk.html" data-page="butikk.html">Nettbutikk</a>
        <a href="om-oss.html" data-page="om-oss.html">Om oss</a>
        <a href="kontakt.html" data-page="kontakt.html">Kontakt</a>
      </nav>
      <button class="btn secondary" id="openCart" type="button">Handlekurv (<span id="cartCount">0</span>)</button>
    </div>
  </header>

  <main id="productPage"></main>

  <div id="cartDrawer" hidden>
    <div class="drawer">
      <div class="drawer-head">
        <h2>Handlekurv</h2>
        <button class="btn ghost" id="closeCart" type="button">Lukk</button>
      </div>
      <div id="cartItems"></div>
      <div class="cart-total">
        <span>Sum</span>
        <span id="cartTotal">0 kr</span>
      </div>
      <input type="hidden" id="checkoutPayload">
      <button class="btn" id="checkoutButton" type="button">Gå til betaling</button>
    </div>
  </div>

  <div id="quoteModal" hidden>
    <div class="modal-card">
      <div class="modal-head">
        <h2>Be om tilbud</h2>
        <button class="btn ghost" id="quoteClose" type="button">Lukk</button>
      </div>
      <div id="quoteSummary" style="font-weight:800;margin-bottom:14px"></div>
      <form name="quote" method="POST" data-netlify="true" action="tilbud-send.html">
        <input type="hidden" name="form-name" value="quote">
        <input type="hidden" id="quoteSku" name="quoteSku">
        <input type="hidden" id="quoteProduct" name="quoteProduct">
        <div class="form-grid">
          <div class="form-group">
            <label for="quoteName">Navn</label>
            <input class="input" id="quoteName" name="quoteName" required>
          </div>
          <div class="form-group">
            <label for="quoteEmail">E-post</label>
            <input class="input" id="quoteEmail" name="quoteEmail" type="email" required>
          </div>
          <div class="form-group">
            <label for="quotePhone">Telefon</label>
            <input class="input" id="quotePhone" name="quotePhone">
          </div>
          <div class="form-group full">
            <label for="quoteMessage">Melding</label>
            <textarea class="input" id="quoteMessage" name="quoteMessage"></textarea>
          </div>
        </div>
        <button class="btn" type="submit">Send forespørsel</button>
      </form>
    </div>
  </div>

  <footer class="footer">
    <div class="container footer-grid">
      <div>© <span id="year"></span> Therwatt AS</div>
      <div><a href="butikk.html">Tilbake til butikk</a></div>
    </div>
  </footer>

  <script src="assets/config.js"></script>
  <script src="assets/main.js"></script>
  <script src="assets/store.js"></script>
</body>
</html>
