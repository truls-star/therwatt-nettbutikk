  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "Hva koster en varmepumpe?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "En luft-vann varmepumpe koster typisk mellom 100 000 og 200 000 kr inkludert installasjon. En bergvarmepumpe (væske-vann) koster mellom 200 000 og 350 000 kr inkludert energibrønn. Med Enova-støtte på opptil 55 000 kr reduseres kostnaden betydelig."
        }
      },
      {
        "@type": "Question",
        "name": "Hvor mye kan jeg spare med varmepumpe?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Med en varmepumpe kan du spare 50-70% på oppvarmingskostnadene. For en typisk enebolig på 150 m² kan dette utgjøre 15 000-30 000 kr i året, avhengig av strømpris og nåværende oppvarmingsmetode."
        }
      },
      {
        "@type": "Question",
        "name": "Hva er vannbåren varme?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Vannbåren varme er et varmesystem der oppvarmet vann sirkulerer i rør under gulvet (gulvvarme) eller gjennom radiatorer. Det gir jevn og behagelig varme, er energieffektivt, og fungerer optimalt med varmepumpe som varmekilde."
        }
      },
      {
        "@type": "Question",
        "name": "Hva er bergvarme?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Bergvarme (også kalt jordvarme eller grunnvarme) utnytter stabil varme fra grunnen via en energibrønn. En væske-vann varmepumpe henter varme fra brønnen og fordeler den via vannbåren gulvvarme eller radiatorer. Bergvarme gir den høyeste virkningsgraden (SCOP) og laveste driftskostnadene."
        }
      },
      {
        "@type": "Question",
        "name": "Hva er forskjellen mellom gulvvarme og radiatorer?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Gulvvarme gir jevn varmefordeling fra gulvet og opp, opererer på lavere vanntemperatur (30-40°C) og er mer energieffektivt med varmepumpe. Radiatorer varmer opp rommet raskere, er enklere å ettermontere, og gir god reguleringsmulighet per rom. Mange kombinerer begge i vannbåren varme-systemer."
        }
      },
      {
        "@type": "Question",
        "name": "Kan jeg få Enova-støtte til varmepumpe?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Ja, Enova gir støtte på opptil 55 000 kr for installasjon av væske-vann varmepumpe (bergvarme). For luft-vann varmepumpe med vannbåren varme kan du få opptil 40 000 kr. Støtten gjelder for boliger som erstatter fossil eller elektrisk oppvarming."
        }
      }
    ]
  }
  </script>
