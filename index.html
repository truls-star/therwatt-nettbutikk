<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Therwatt – Varmepumper og gulvvarme</title>
  <meta name="description" content="Beregn hvor mye du kan spare med varmepumpe. Norges mest informative varmepumpekalkulator med tilbakebetalingstid, Enova-støtte og anbefalt type. Eksperter på varmepumper og vannbåren varme.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/css/main.css">

  <!-- Netlify Forms: hidden forms for bot detection -->
  <form name="leads" netlify netlify-honeypot="bot-field" hidden>
    <input name="bot-field">
    <input name="navn">
    <input name="epost">
    <input name="telefon">
    <input name="boligareal">
    <input name="byggear">
    <input name="oppvarmingstype">
    <textarea name="melding"></textarea>
  </form>
  <form name="kontakt" netlify netlify-honeypot="bot-field" hidden>
    <input name="bot-field">
    <input name="navn">
    <input name="epost">
    <input name="telefon">
    <textarea name="melding"></textarea>
  </form>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/js/main.js"></script>
</body>
</html>
